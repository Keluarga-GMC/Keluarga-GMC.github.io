<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    
    <!-- Primary Meta Tags -->
    <title>Generation of Moemoent Clan</title>
    <meta name="description" content="Arsip digital dan silsilah resmi Keluarga Besar Moemoent Clan.">

    <!-- Open Graph / Facebook / WhatsApp -->
    <meta property="og:type" content="website">
    <meta property="og:url" content="https://keluarga-gmc.github.io/">
    <meta property="og:title" content="Generation of Moemoent Clan">
    <meta property="og:description" content="Arsip digital dan silsilah resmi Keluarga Besar Moemoent Clan. Menelusuri jejak leluhur, menjaga sejarah, dan mempererat silaturahmi antar generasi. ">
    <!-- Pastikan file ini ada di folder images Anda -->
    <meta property="og:image" content="https://keluarga-gmc.github.io/images/preview-image.jpg">

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image">
    <meta property="twitter:title" content="Generation of Moemoent Clan">
    <meta property="twitter:description" content="Arsip digital dan silsilah resmi Keluarga Besar Moemoent Clan.">
    <meta property="twitter:image" content="https://keluarga-gmc.github.io/images/preview-image.jpg">

    <!-- CSS & Favicon -->
    <link rel="stylesheet" href="./css/style.css">
    <link rel="icon" type="image/x-icon" href="favicon.ico">
</head>
<body>
    <div class="login-container">
        <!-- Isi Body Tetap Sama -->
        <div class="login-box">
            <h1>🌳 Generation of Moemoent Clan</h1>
            <p class="subtitle">Silakan login untuk melihat silsilah keluarga</p>
            
            <form id="loginForm">
                <div class="form-group">
                    <label for="username">Username</label>
                    <input type="text" id="username" name="username" placeholder="Masukkan username" required autocomplete="username">
                </div>
                
                <div class="form-group">
                    <label for="password">Password</label>
                    <input type="password" id="password" name="password" placeholder="Masukkan password" required autocomplete="current-password">
                </div>
                
                <button type="submit" class="btn">Masuk</button>
            </form>
            
            <p id="errorMessage" class="error-message"></p>
        </div>
    </div>

    <script src="./js/auth.js"></script>
</body>
</html>
